name: Reconstruct meta builds

# Regenerates the loadable builds/*.build files from current top public-ladder characters
# (via poe.ninja), one per meta ascendancy. Weekly + on demand — the meta shifts slowly and
# this hits an undocumented, solo-run endpoint, so keep the cadence gentle. Node, not Python:
# tools/build-from-ninja.cjs is the reconstructor (passives via the GGG tree export, gems via
# PoB2 metadata). Data is fetched at runtime; nothing is vendored.

on:
  schedule:
    - cron: "23 6 * * 1"   # 06:23 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: builds
  cancel-in-progress: false

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # gate the (expensive, ~10-min networked) reconstruction on the cjs unit tests so a broken
      # edit fails fast here instead of writing bad builds.
      - name: Reconstructor + effects syntax + unit tests
        run: |
          node --check tools/build-from-ninja.cjs
          node --check tools/effects.cjs
          node --test tools/test-build-from-ninja.cjs tools/test-effects.cjs tools/test-contracts.cjs tools/test-frontend.cjs

      - name: Reconstruct builds + meta breakdown (one pass per ascendancy)
        run: node tools/build-from-ninja.cjs --enumerate --league runesofaldur

      # Gate the commit on the honesty invariants (mirrors distill.yml): every committed .build
      # must pass buildfile.validate + is_loadable. If reconstruction wrote a bad file, this
      # fails the job and nothing is committed, so the live site keeps the last good builds.
      - name: Validate reconstructed builds
        run: python scripts/test_distill.py

      - name: Commit refreshed builds + meta
        run: |
          git config user.name  "tincture-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- builds/ meta-detail.json effects.json; then
            echo "No change this run."
          else
            git add builds/ meta-detail.json effects.json
            git commit -m "Builds: refresh reconstructed builds + meta + effects ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            # the hourly distill bot pushes to the same branch — rebase to avoid a Monday race
            git pull --rebase --autostash origin main
            git push
          fi
