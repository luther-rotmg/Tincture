name: Distill the meta

# Runs hourly and on demand. Free-tier scheduled runs can be delayed by GitHub
# and will pause after ~60 days with no repo activity — push a commit or hit
# "Run workflow" to wake it back up.
on:
  schedule:
    - cron: "7 * * * *"   # a few minutes past the hour, every hour
  workflow_dispatch:        # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: write           # needed to commit the refreshed data.json

concurrency:
  group: distill
  cancel-in-progress: false

jobs:
  distill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Distill the current-league meta
        run: python scripts/distill.py

      # Gate the commit on the OUTPUT-INTEGRITY invariants only: if the freshly-written
      # data.json is malformed/inflated/fabricated, this fails the job and the commit step
      # never runs, so the live site keeps the last good data.json. Fail-safe by construction.
      # The curation-coverage lock (every live ascendancy has a guide) is enforced in
      # test.yml, NOT here — a missing guide link must never freeze the meta refresh (the
      # front end falls back to a neutral search, and the next step warns). TINCTURE_DISTILL_GATE
      # skips exactly that one live-data curation test.
      - name: Validate the distilled data (output-integrity gate)
        run: python scripts/test_distill.py
        env:
          TINCTURE_DISTILL_GATE: "1"

      # A REMINDER, not a gate. The meta keeps refreshing even when curation lags; the hard
      # coverage-lock lives in test.yml. Emits ::warning:: annotations so an untriaged
      # ascendancy shows on the run summary instead of being buried in the distill step's log.
      # Defensive + continue-on-error so it can never fail the hourly job.
      - name: Flag untriaged ascendancies (non-blocking)
        continue-on-error: true
        run: |
          python - <<'PY'
          import json, sys
          sys.path.insert(0, "scripts")
          import distill
          try:
              doc = json.load(open("guides.json", encoding="utf-8"))
              payload = json.load(open("data.json", encoding="utf-8"))
          except Exception as e:
              print(f"::notice::skipped guide-coverage check: {e}")
              sys.exit(0)
          for slug in distill.untriaged_guides(payload, doc):
              print(f"::warning title=Untriaged build guide::'{slug}' is live but has no build "
                    f"guide — add it to guides.json guides or unguided")
          for slug in distill.untriaged_leveling(payload, doc):
              print(f"::warning title=Untriaged leveling guide::'{slug}' is live but has no "
                    f"leveling guide — add it to guides.json leveling or levelingUnguided")
          PY

      - name: Commit refreshed data
        run: |
          git config user.name  "tincture-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json sitemap.xml history.json b/ economy.json; then
            echo "No change in the meta this run."
          else
            git add data.json sitemap.xml history.json b/ economy.json
            git commit -m "Distill: refresh meta ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            # the weekly builds bot pushes to the same branch — rebase to avoid a Monday race
            git pull --rebase --autostash origin main
            git push
          fi
