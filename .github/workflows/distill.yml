name: Distill the meta

# Runs hourly and on demand. Free-tier scheduled runs can be delayed by GitHub
# and will pause after ~60 days with no repo activity — push a commit or hit
# "Run workflow" to wake it back up.
on:
  schedule:
    - cron: "7 * * * *"   # a few minutes past the hour, every hour
  workflow_dispatch:        # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: write           # needed to commit the refreshed data.json

concurrency:
  group: distill
  cancel-in-progress: false

jobs:
  distill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Distill the current-league meta
        run: python scripts/distill.py

      # Gate the commit on the honesty invariants: if the freshly-written data.json is
      # malformed or inflated, this fails the job and the commit step never runs, so the
      # live site keeps the last good data.json. Fail-safe by construction.
      - name: Validate the distilled data
        run: python scripts/test_distill.py

      - name: Commit refreshed data
        run: |
          git config user.name  "tincture-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json sitemap.xml history.json b/ economy.json; then
            echo "No change in the meta this run."
          else
            git add data.json sitemap.xml history.json b/ economy.json
            git commit -m "Distill: refresh meta ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            # the weekly builds bot pushes to the same branch — rebase to avoid a Monday race
            git pull --rebase --autostash origin main
            git push
          fi
